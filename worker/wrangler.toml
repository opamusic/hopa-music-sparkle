name = "opa-airtable-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"
workers_dev = true
preview_urls = false

[vars]
AIRTABLE_BASE_ID = "appEZlJMMqIFotqrE"
AIRTABLE_TABLE_ID = "tblKyjUANobKqOa9C"
# Comma-separated list. Include your GitHub Pages origin and localhost for dev.
ALLOWED_ORIGINS = "https://opamusic.co.il,https://opamusic.github.io,http://localhost:8080,http://localhost:5173"

# AIRTABLE_TOKEN is a secret — set with:
#   cd worker && npx wrangler secret put AIRTABLE_TOKEN

# Rate limit: max 5 lead submissions per IP per 60 seconds.
[[unsafe.bindings]]
name = "RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1